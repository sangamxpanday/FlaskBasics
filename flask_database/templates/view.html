<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

    <h2>Student Records</h2>

    <table border="1" cellpadding="10">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="{{ url_for('home') }}">Add New Student</a>

</body>
</html>
