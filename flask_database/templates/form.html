<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h2>Add Student</h2>

    <form action="{{ url_for('submit') }}" method="POST">

        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <button type="submit">
            Save
        </button>

    </form>

    <br>

    <a href="{{ url_for('view') }}">View Students</a>

</body>
</html>
